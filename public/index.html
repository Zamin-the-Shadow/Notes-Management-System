<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Securely create, edit, delete, and search your personal notes in real-time.">
  <title>BlueNote - Personal Notes Management System</title>
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <!-- Stylesheet -->
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- Toast Notification Container -->
  <div id="toast-container" class="toast-container"></div>

  <!-- Main Container -->
  <div id="app" class="app-container">
    
    <!-- Auth Section -->
    <section id="auth-section" class="auth-section active">
      <div class="auth-card-wrapper">
        <div class="brand-header">
          <div class="logo-icon">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 20h9"></path>
              <path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"></path>
            </svg>
          </div>
          <h1>BlueNote</h1>
          <p>Organize your thoughts seamlessly</p>
        </div>
        
        <div class="auth-card">
          <!-- Toggle Tabs -->
          <div class="auth-tabs">
            <button id="tab-login" class="auth-tab active" onclick="switchAuthTab('login')">Log In</button>
            <button id="tab-signup" class="auth-tab" onclick="switchAuthTab('signup')">Sign Up</button>
          </div>

          <!-- Login Form -->
          <form id="login-form" class="auth-form active">
            <div class="form-group">
              <label for="login-email">Email Address</label>
              <input type="email" id="login-email" required placeholder="name@example.com">
            </div>
            <div class="form-group">
              <label for="login-password">Password</label>
              <input type="password" id="login-password" required placeholder="••••••••">
            </div>
            <button type="submit" class="btn btn-primary btn-block">
              <span>Log In</span>
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="btn-icon">
                <line x1="5" y1="12" x2="19" y2="12"></line>
                <polyline points="12 5 19 12 12 19"></polyline>
              </svg>
            </button>
          </form>

          <!-- Signup Form -->
          <form id="signup-form" class="auth-form">
            <div class="form-group">
              <label for="signup-email">Email Address</label>
              <input type="email" id="signup-email" required placeholder="name@example.com">
            </div>
            <div class="form-group">
              <label for="signup-password">Password</label>
              <input type="password" id="signup-password" required placeholder="At least 6 characters">
            </div>
            <div class="form-group">
              <label for="signup-confirm-password">Confirm Password</label>
              <input type="password" id="signup-confirm-password" required placeholder="••••••••">
            </div>
            <button type="submit" class="btn btn-primary btn-block">
              <span>Create Account</span>
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="btn-icon">
                <line x1="5" y1="12" x2="19" y2="12"></line>
                <polyline points="12 5 19 12 12 19"></polyline>
              </svg>
            </button>
          </form>
        </div>
      </div>
    </section>

    <!-- Dashboard Section -->
    <section id="dashboard-section" class="dashboard-section">
      <!-- Dashboard Header -->
      <header class="dashboard-header">
        <div class="header-logo">
          <div class="logo-icon small">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 20h9"></path>
              <path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"></path>
            </svg>
          </div>
          <h2>BlueNote</h2>
        </div>
        
        <div class="header-actions">
          <div class="search-bar-wrapper">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="search-icon">
              <circle cx="11" cy="11" r="8"></circle>
              <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
            </svg>
            <input type="text" id="search-input" placeholder="Search by title or content...">
          </div>
          
          <div class="user-profile">
            <span id="user-display-email" class="user-email">user@example.com</span>
            <button id="logout-btn" class="btn btn-secondary" title="Log Out">
              <span>Log Out</span>
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="logout-icon">
                <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                <polyline points="16 17 21 12 16 7"></polyline>
                <line x1="21" y1="12" x2="9" y2="12"></line>
              </svg>
            </button>
          </div>
        </div>
      </header>

      <!-- Dashboard Body -->
      <main class="dashboard-body">
        
        <!-- Note Input Area -->
        <aside class="note-input-container">
          <div class="note-editor-card">
            <h3 id="editor-title-text">Create Note</h3>
            <form id="note-form">
              <!-- Note ID (hidden field for edits) -->
              <input type="hidden" id="note-id" value="">
              
              <div class="form-group">
                <input type="text" id="note-title" required placeholder="Note Title" autocomplete="off">
              </div>
              <div class="form-group">
                <textarea id="note-content" required placeholder="Take a note..."></textarea>
              </div>
              <div class="editor-buttons">
                <button type="submit" id="save-note-btn" class="btn btn-primary">
                  <span>Save Note</span>
                </button>
                <button type="button" id="cancel-edit-btn" class="btn btn-secondary hidden">
                  <span>Cancel</span>
                </button>
              </div>
            </form>
          </div>
        </aside>

        <!-- Notes Grid/List -->
        <section class="notes-grid-container">
          <div id="notes-grid" class="notes-grid">
            <!-- Notes populated by JavaScript -->
          </div>
          
          <!-- Empty State -->
          <div id="empty-state" class="empty-state hidden">
            <div class="empty-icon">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                <polyline points="14 2 14 8 20 8"></polyline>
                <line x1="9" y1="15" x2="15" y2="15"></line>
                <line x1="9" y1="11" x2="15" y2="11"></line>
                <line x1="9" y1="19" x2="13" y2="19"></line>
              </svg>
            </div>
            <h3>No notes yet</h3>
            <p>Start writing down your ideas, lists, and thoughts!</p>
          </div>

          <!-- Search No Results State -->
          <div id="no-search-results" class="empty-state hidden">
            <div class="empty-icon">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="11" cy="11" r="8"></circle>
                <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                <line x1="8" y1="11" x2="14" y2="11"></line>
              </svg>
            </div>
            <h3>No matching notes</h3>
            <p>We couldn't find anything matching your search query.</p>
          </div>
        </section>

      </main>
    </section>

  </div>

  <!-- JavaScript application file -->
  <script src="js/app.js"></script>
</body>
</html>
